  var isOpen = false;

  // 1. 플로팅 버튼 생성 (뚜누 로고)
  var btn = document.createElement('button');
  btn.id = 'tounou-cs-bot-toggle-btn';
  btn.style.cssText = [
    'position:fixed',
    'right:24px',
    'bottom:24px',
    'width:56px',
    'height:56px',
    'border-radius:50%',
    'background:#fff',
    'border:1px solid #e5e5e5',
    'box-shadow:0 4px 16px rgba(0,0,0,.2)',
    'cursor:pointer',
    'z-index:999998',
    'display:flex',
    'align-items:center',
    'justify-content:center',
    'transition:transform .15s',
    'padding:0'
  ].join(';');

  btn.style.cssText += ';position:fixed;';

  var btnImg = document.createElement('img');
  btnImg.src = LOGO_URI;
  btnImg.alt = '뚜누 CS 가이드';
  btnImg.style.cssText = 'width:30px;height:30px;object-fit:contain;';
  btn.appendChild(btnImg);

  var closeMark = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  closeMark.setAttribute('viewBox', '0 0 24 24');
  closeMark.setAttribute('width', '26');
  closeMark.setAttribute('height', '26');
  closeMark.style.cssText = 'display:none;opacity:0.55;';
  closeMark.innerHTML = '<line x1="5" y1="5" x2="19" y2="19" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/><line x1="19" y1="5" x2="5" y2="19" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>';
  btn.appendChild(closeMark);

  btn.onmouseenter = function () { btn.style.transform = 'scale(1.08)'; };
  btn.onmouseleave = function () { btn.style.transform = 'scale(1)'; };

  // 2. iframe 컨테이너 생성 (처음엔 숨김)
  var container = document.createElement('div');
  container.id = 'tounou-cs-bot-container';
  container.style.cssText = [
    'position:fixed',
    'right:24px',
    'bottom:92px',
    'width:420px',
    'height:700px',
    'max-height:78vh',
    'border-radius:16px',
    'overflow:hidden',
    'box-shadow:0 8px 32px rgba(0,0,0,.3)',
    'z-index:999999',
    'display:none',
    'background:#fff'
  ].join(';');

  var iframe = document.createElement('iframe');
  iframe.setAttribute('allow', 'clipboard-write');
  iframe.src = BOT_URL;
  iframe.style.cssText = 'width:100%;height:100%;border:none;';
  container.appendChild(iframe);

  // 3. 토글 동작 (버튼 이미지는 유지, 열림 시 X 아이콘으로 살짝 표시)
  btn.addEventListener('click', function () {
    isOpen = !isOpen;
    container.style.display = isOpen ? 'block' : 'none';
    btnImg.style.display = isOpen ? 'none' : 'block';
    closeMark.style.display = isOpen ? 'block' : 'none';
  });

  // 4. 모바일 대응 (화면 작을 때 전체화면에 가깝게)
  function adjustForMobile() {
    if (window.innerWidth < 480) {
      container.style.width = 'calc(100vw - 24px)';
      container.style.right = '12px';
      container.style.height = 'calc(100vh - 120px)';
    } else {
      container.style.width = '420px';
      container.style.right = '24px';
      container.style.height = '700px';
    }
  }
  adjustForMobile();
  window.addEventListener('resize', adjustForMobile);

  // 5. DOM에 삽입
  document.body.appendChild(btn);
  document.body.appendChild(container);
})();

  </script>
