<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뚜누 CS 가이드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#f0f0f0;font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;height:100%;overflow:hidden;scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;display:none;}

.app{width:100%;height:100%;margin:0;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden;}

/* 헤더 */
.header{background:#1a1a1a;height:54px;padding:0 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.h-logo{height:20px;width:auto;display:block;flex-shrink:0;}
.h-title{font-size:15px;font-weight:600;color:#fff;letter-spacing:0.01em;line-height:1;}
.h-sub{font-size:12px;color:#888;margin-top:2px;}

/* 채팅 영역 */
.chat{flex:1;min-height:0;overflow-y:auto;padding:14px 12px 10px;display:flex;flex-direction:column;gap:10px;scrollbar-width:none;-ms-overflow-style:none;}
.chat::-webkit-scrollbar{width:0;height:0;display:none;}

/* 봇 말풍선 */
.row-bot{display:flex;}

.bubble-bot{background:#f6f6f6;border-radius:4px 16px 16px 16px;padding:11px 13px;font-size:14px;color:#222;line-height:1.6;max-width:85%;}

/* 유저 말풍선 */
.row-user{display:flex;justify-content:flex-end;}
.bubble-user{background:#FEE500;border-radius:16px 4px 16px 16px;padding:9px 13px;font-size:14px;color:#1a1a1a;font-weight:500;max-width:85%;}

/* 채널 칩 */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.chip{background:#fff;border:1.5px solid #ddd;border-radius:8px;padding:7px 14px;font-size:13px;color:#333;cursor:pointer;transition:all .12s;font-weight:500;}
.chip:hover{border-color:#1a1a1a;}
.chip.sel{background:#FFF8DC;border-color:#FFE066;color:#1a1a1a;font-weight:700;}

/* 답변 카드 */
.ans-wrap{display:block;max-width:100%;}
.ans-card{font-size:14px;color:#222;line-height:1.6;}
.draft-wrap{display:table;position:relative;padding:5px 0 0 5px;margin-bottom:10px;}
.draft-wrap::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;background:#D9D9D9;}
.draft-box{position:relative;background:#F5F5F5;border-radius:11px;padding:11px 13px;}
.draft-lbl{font-size:13px;font-weight:600;color:#333333;letter-spacing:.02em;display:flex;align-items:center;justify-content:space-between;gap:14px;cursor:pointer;user-select:none;}
.draft-txt{font-size:14px;color:#333;line-height:1.65;white-space:pre-wrap;}
.copy-btn{display:flex;align-items:center;gap:4px;margin-top:10px;background:#ffffff;border:1px solid #dcdcdc;border-radius:6px;padding:7px 13px;font-size:13px;color:#555;cursor:pointer;font-family:inherit;transition:all .1s;}
.copy-btn:hover{background:#efefef;}
.copy-btn.copied{color:#1a7a34;border-color:#b6dfc0;background:#f0faf2;}

.range-wrap{display:table;position:relative;padding:5px 0 0 5px;margin-bottom:10px;}
.range-wrap::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;background:#DCEBFA;}
.range-box{position:relative;background:#F1F8FD;border-radius:11px;padding:11px 13px;}
.range-lbl{font-size:13px;font-weight:600;color:#0C447C;letter-spacing:.02em;}
.range-txt{font-size:14px;color:#1a1a1a;line-height:1.6;white-space:pre-wrap;}

.caution-wrap{display:table;position:relative;padding:5px 0 0 5px;margin-bottom:10px;}
.caution-wrap::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;background:#F7C1C1;}
.caution-box{position:relative;background:#FCEBEB;border-radius:11px;padding:11px 13px;}
.caution-lbl{font-size:13px;font-weight:600;color:#501313;letter-spacing:.02em;}
.caution-txt{font-size:14px;color:#1a1a1a;line-height:1.6;white-space:pre-wrap;}

.tip-wrap{display:table;position:relative;padding:5px 0 0 5px;margin-bottom:10px;}
.tip-wrap::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;background:#FFE066;}
.tip-box{position:relative;background:#FFF8DC;border-radius:11px;padding:11px 13px;}
.tip-lbl{font-size:13px;font-weight:600;color:#412402;letter-spacing:.02em;}
.tip-txt{font-size:14px;color:#1a1a1a;line-height:1.6;}

.guide-wrap{display:table;position:relative;padding:5px 0 0 5px;margin-bottom:10px;}
.guide-wrap::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;background:#DCEBFA;}
.guide-box{position:relative;background:#F1F8FD;border-radius:11px;padding:11px 13px;}
.guide-lbl{font-size:13px;font-weight:600;color:#0C447C;letter-spacing:.02em;}
.guide-txt{font-size:14px;color:#1a1a1a;line-height:1.6;white-space:pre-wrap;}

/* 아코디언 토글 */
.range-lbl,.caution-lbl,.tip-lbl,.guide-lbl{display:flex;align-items:center;justify-content:space-between;gap:14px;cursor:pointer;user-select:none;}
.acc-arrow{font-size:15px;margin-left:8px;transition:transform .15s;flex-shrink:0;}
.acc-arrow.open{transform:rotate(180deg);}
.acc-body{display:none;margin-top:9px;}
.acc-body.open{display:block;}
.range-wrap,.caution-wrap,.tip-wrap,.guide-wrap,.draft-wrap{min-width:180px;}
.range-box,.caution-box,.tip-box,.guide-box,.draft-box{overflow-wrap:break-word;min-width:0;}

.reset-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;background:#fff;border:1.5px solid #e0e0e0;border-radius:16px;padding:8px 15px;font-size:13px;color:#666;cursor:pointer;font-family:inherit;transition:all .12s;}
.reset-btn:hover{border-color:#1a1a1a;color:#1a1a1a;}

/* 하단 입력 고정 */
.input-area{flex-shrink:0;position:relative;padding:8px 12px 12px;background:#fff;border-top:1px solid #eee;}
.dropdown{position:absolute;bottom:calc(100% + 2px);left:12px;right:12px;background:#fff;border:1.5px solid #e0e0e0;border-radius:12px;box-shadow:0 -4px 16px rgba(0,0,0,.1);z-index:100;max-height:220px;overflow-y:auto;display:none;}
.dropdown.show{display:block;}
.drop-cat{padding:6px 14px;font-size:11px;font-weight:700;color:#bbb;letter-spacing:.06em;background:#fafafa;}
.drop-item{padding:11px 14px;font-size:14px;color:#333;cursor:pointer;border-bottom:1px solid #f5f5f5;transition:background .1s;}
.drop-item:last-child{border-bottom:none;}
.drop-item:hover,.drop-item.active{background:#ffe066;}
.no-result{padding:14px 16px;font-size:14px;color:#aaa;text-align:center;}
.input-row{display:flex;gap:8px;align-items:center;}
.input-box{flex:1;background:#f5f5f5;border:none;border-radius:20px;padding:10px 14px;font-size:14px;color:#222;font-family:inherit;outline:none;}
.input-box:disabled{color:#bbb;cursor:not-allowed;}
.input-box::placeholder{color:#aaa;}
.input-box:focus{background:#eee;}
.send-btn{width:36px;height:36px;border-radius:50%;background:#1a1a1a;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#fff;}
.send-btn svg{width:17px;height:17px;}
.send-btn:hover{background:#333;}
</style>
</head>

let selectedItem = null;
let filteredItems = [];
let dropIdx = -1;
let currentType = null; // 'inquiry' | 'review' -- set per-item when picked from the merged list

function onInput(val) {
  const dd = document.getElementById('dropdown');
  const q = val.trim().toLowerCase();
  if (!q) { dd.classList.remove('show'); filteredItems = []; return; }

  const combined = ITEMS.map(it => Object.assign({}, it, { _type: 'inquiry' }))
    .concat(REVIEW_ITEMS.map(it => Object.assign({}, it, { _type: 'review' })));
  filteredItems = combined.filter(it =>
    it.keys.some(k => k.toLowerCase().includes(q)) || it.label.toLowerCase().includes(q)
  );

  // 같은 카테고리 안에서는 "카테고리 > 세부명" 뒷부분 기준 가나다순 정렬
  const catOrder = [];
  const groups = {};
  filteredItems.forEach(it => {
    if (!groups[it.cat]) { groups[it.cat] = []; catOrder.push(it.cat); }
    groups[it.cat].push(it);
  });
  const sortKey = it => (it.label.includes('>') ? it.label.split('>')[1] : it.label).trim();
  catOrder.forEach(cat => {
    groups[cat].sort((a, b) => sortKey(a).localeCompare(sortKey(b), 'ko'));
  });
  filteredItems = catOrder.flatMap(cat => groups[cat]);

  dropIdx = -1;
  renderDropdown();
}

function renderDropdown() {
  const dd = document.getElementById('dropdown');
  if (filteredItems.length === 0) {
    dd.innerHTML = '<div class="no-result">일치하는 항목이 없습니다</div>';
    dd.classList.add('show');
    return;
  }
  let html = '';
  let lastCat = '';
  filteredItems.forEach((it, i) => {
    if (it.cat !== lastCat) {
      html += `<div class="drop-cat">${it.cat}</div>`;
      lastCat = it.cat;
    }
    html += `<div class="drop-item" data-idx="${i}" onmousedown="pickItem(${i})">${it.label}</div>`;
  });
  dd.innerHTML = html;
  dd.classList.add('show');
}

function updateActive() {
  document.querySelectorAll('.drop-item').forEach((el, i) => {
    el.classList.toggle('active', i === dropIdx);
    if (i === dropIdx) el.scrollIntoView({block:'nearest'});
  });
}

function onKeyDown(e) {
  const items = document.querySelectorAll('.drop-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); dropIdx = Math.min(dropIdx+1, items.length-1); updateActive(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); dropIdx = Math.max(dropIdx-1, 0); updateActive(); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (dropIdx >= 0) pickItem(dropIdx);
  }
  else if (e.key === 'Escape') { document.getElementById('dropdown').classList.remove('show'); }
}

function sendEnter() {
  if (dropIdx >= 0) pickItem(dropIdx);
}

function pickItem(idx) {
  const item = filteredItems[idx];
  if (!item) return;
  selectedItem = item;
  currentType = item._type || 'inquiry';
  document.getElementById('dropdown').classList.remove('show');
  document.getElementById('input-box').value = '';
  filteredItems = [];
  dropIdx = -1;

  addUserBubble(item.label);

  const scripts = currentType === 'review' ? REVIEW_SCRIPTS : SCRIPTS;
  const s = scripts[item.label];
  if (s && (s.guide || s.draftOnly)) {
    addGuideCard(s);
    addResetBubble();
    selectedItem = null;
    return;
  }
  addChannelChips(item.label);
}

function bulletLine(line) {
  return /^- /.test(line) ? '·\u2002' + line.slice(2) : line;
}

const TABLE_MARKERS = {
  '제품별 제작 기간': LEADTIME_TABLE,
  '사이즈별 호환 상품': SHOPPINGBAG_TABLE
};

function findTableMarker(text) {
  for (const marker in TABLE_MARKERS) {
    if (text.includes(marker)) return marker;
  }
  return null;
}

function renderRange(text) {
  const formatLine = line => /^\d+\.\s/.test(line) ? `<b>${line}</b>` : bulletLine(line);
  const marker = findTableMarker(text);
  if (!marker) return text.split('\n').map(formatLine).join('\n');
  const idx = text.indexOf(marker);
  const before = text.substring(0, idx).trimEnd();
  const lineEnd = text.indexOf('\n', idx);
  const label = lineEnd === -1 ? text.substring(idx).trim() : text.substring(idx, lineEnd).trim();
  const beforeHtml = before ? before.split('\n').map(formatLine).join('\n') : '';
  return (beforeHtml ? beforeHtml + '\n' : '') +
    `<span style="font-size:14px;font-weight:600;display:block;margin-top:6px;margin-bottom:4px;">${label}</span>` +
    TABLE_MARKERS[marker];
}

function renderGuide(text) {
  const marker = findTableMarker(text);
  if (!marker) return text.split('\n').map(bulletLine).join('\n');
  const idx = text.indexOf(marker);
  const before = text.substring(0, idx).trimEnd();
  const lineEnd = text.indexOf('\n', idx);
  const label = lineEnd === -1 ? text.substring(idx).trim() : text.substring(idx, lineEnd).trim();
  const beforeHtml = before ? before.split('\n').map(bulletLine).join('\n') : '';
  return (beforeHtml ? beforeHtml + '\n' : '') +
    `<span style="font-size:14px;font-weight:600;display:block;margin-top:6px;margin-bottom:4px;">${label}</span>` +
    TABLE_MARKERS[marker];
}

function renderCaution(text) {
  return text.split('\n').map(bulletLine).join('\n');
}

function renderTip(tip) {
  const TABLE_MARKER = '결제수단별 환불기간';
  const indentLine = line => bulletLine(line).replace(/^( +)/, m => '&nbsp;'.repeat(m.length * 2));
  const toHtml = t => t.split('\n').map(indentLine).join('<br>');
  if (!tip.includes(TABLE_MARKER)) return toHtml(tip);
  const idx = tip.indexOf(TABLE_MARKER);
  const before = tip.substring(0, idx).trimEnd();
  const lineEnd = tip.indexOf('\n', idx);
  const label = lineEnd === -1 ? tip.substring(idx).trim() : tip.substring(idx, lineEnd).trim();
  const beforeHtml = before ? toHtml(before) : '';
  return (beforeHtml ? beforeHtml + '<br>' : '') +
    `<span style="font-size:12px;color:#888;display:block;margin-top:8px;margin-bottom:2px;">${label}</span>` +
    REFUND_TABLE;
}

  </div></div>`;
  if (range) html += `<div class="range-wrap"><div class="range-box"><div class="range-lbl" onclick="toggleAcc(this)">📋 ${s.rangeLabel || '응대 담당자 처리 범위'}<span class="acc-arrow">▾</span></div><div class="range-txt acc-body">${renderRange(range)}</div></div></div>`;
  if (caut && caut !== '준비 중입니다.') html += `<div class="caution-wrap"><div class="caution-box"><div class="caution-lbl" onclick="toggleAcc(this)">⚠️ 주의사항<span class="acc-arrow">▾</span></div><div class="caution-txt acc-body">${renderCaution(caut)}</div></div></div>`;
  if (tip && tip !== '준비 중입니다.') html += `<div class="tip-wrap"><div class="tip-box"><div class="tip-lbl" onclick="toggleAcc(this)">💡 PLUS TIP<span class="acc-arrow">▾</span></div><div class="tip-txt acc-body">${renderTip(tip)}</div></div></div>`;
  html += `<button class="reset-btn" onclick="resetAll()">↺ 처음으로 돌아가기</button>`;
  html += `</div>`;

  row.innerHTML = html;
  chat.appendChild(row);
  if (autoOpenIfSingle(row)) {
    row.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    equalizeWrapWidths(row);
    scrollBottom();
  }
}

function addGuideCard(s) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'row-bot';
  let inner = '';
  if (s.draftOnly) {
    const uid = Date.now();
    inner += `<div class="draft-wrap"><div class="draft-box">
      <div class="draft-lbl" onclick="toggleAcc(this)">✅ 고객 안내 초안<span class="acc-arrow">▾</span></div>
      <div class="acc-body">
        <div class="draft-txt" id="draft-${uid}">${s.draftOnly}</div>
        <button class="copy-btn" id="copy-${uid}" onclick="copyDraft('${uid}')">📋 복사</button>
      </div>
    </div></div>`;
  }
  if (s.guide) {
    inner += `<div class="guide-wrap"><div class="guide-box">
      <div class="guide-lbl" onclick="toggleAcc(this)">📋 응대 가이드<span class="acc-arrow">▾</span></div>
      <div class="guide-txt acc-body">${renderGuide(s.guide)}</div>
    </div></div>`;
  }
  if (s['주의사항'] && s['주의사항'] !== '준비 중입니다.') {
    inner += `<div class="caution-wrap"><div class="caution-box"><div class="caution-lbl" onclick="toggleAcc(this)">⚠️ 주의사항<span class="acc-arrow">▾</span></div><div class="caution-txt acc-body">${renderCaution(s['주의사항'])}</div></div></div>`;
  }
  if (s['tip'] && s['tip'] !== '준비 중입니다.') {
    inner += `<div class="tip-wrap"><div class="tip-box"><div class="tip-lbl" onclick="toggleAcc(this)">💡 PLUS TIP<span class="acc-arrow">▾</span></div><div class="tip-txt acc-body">${renderTip(s['tip'])}</div></div></div>`;
  }
  row.innerHTML = `<div class="ans-card">${inner}</div>`;
  chat.appendChild(row);
  if (autoOpenIfSingle(row)) {
    row.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    equalizeWrapWidths(row);
    scrollBottom();
  }
}

function addResetBubble() {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'row-bot';
  row.innerHTML = `<button class="reset-btn" style="margin-left:11px;margin-top:2px;" onclick="resetAll()">↺ 처음으로 돌아가기</button>`;
  chat.appendChild(row);
}

function copyDraft(uid) {
  const el = document.getElementById(`draft-${uid}`);
  const btn = document.getElementById(`copy-${uid}`);
  const text = el.innerText;

  function showCopied() {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 복사'; btn.classList.remove('copied'); }, 2000);
  }

  function fallbackCopy() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      showCopied();
    } catch (e) {
      btn.textContent = '복사 실패, 직접 선택해주세요';
      setTimeout(() => { btn.textContent = '📋 복사'; }, 2500);
    }
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopied).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
}

function resetAll() {
  selectedItem = null; filteredItems = []; dropIdx = -1; currentType = null;
  const inputBox = document.getElementById('input-box');
  inputBox.value = '';
  inputBox.disabled = false;
  inputBox.placeholder = '키워드를 입력해주세요...';
  document.getElementById('dropdown').classList.remove('show');
  document.getElementById('chat').innerHTML = `
    <div class="row-bot">
      
      <div class="bubble-bot">안녕하세요. 뚜누 CS 가이드 봇입니다!<br>궁금한 항목의 키워드를 입력해 주세요.<br><span style="font-size:12px;color:#999;">예: 반품, 교환, 상품 카테고리</span>
      </div>
    </div>`;
}

function toggleAcc(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('.acc-arrow');
  const wrap = el.closest('.range-wrap, .caution-wrap, .tip-wrap, .guide-wrap, .draft-wrap');
  const willOpen = !body.classList.contains('open');
  body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
  if (wrap) {
    wrap.style.width = willOpen ? '370px' : (wrap.dataset.closedWidth ? wrap.dataset.closedWidth + 'px' : '');
  }
  requestAnimationFrame(() => {
    if (willOpen) {
      body.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });
}

function autoOpenIfSingle(row) {
  const wraps = row.querySelectorAll('.range-wrap, .caution-wrap, .tip-wrap, .guide-wrap, .draft-wrap');
  if (wraps.length !== 1) return false;
  const wrap = wraps[0];
  const lbl = wrap.querySelector('.guide-lbl, .draft-lbl, .range-lbl, .caution-lbl, .tip-lbl');
  const body = wrap.querySelector('.acc-body');
  const arrow = wrap.querySelector('.acc-arrow');
  let naturalWidth = 200;
  try {
    if (lbl) {
      const prevWS = lbl.style.whiteSpace;
      lbl.style.whiteSpace = 'nowrap';
      naturalWidth = Math.ceil(lbl.getBoundingClientRect().width) + 28;
      lbl.style.whiteSpace = prevWS;
    }
  } catch (e) { /* keep fallback width */ }
  wrap.dataset.closedWidth = naturalWidth;
  if (body) body.classList.add('open');
  if (arrow) arrow.classList.add('open');
  wrap.style.width = '370px';
  return true;
}

function equalizeWrapWidths(container) {
  const wraps = container.querySelectorAll('.range-wrap, .caution-wrap, .tip-wrap, .guide-wrap, .draft-wrap');
  if (!wraps.length) return;
  wraps.forEach(w => { w.style.width = ''; });
  let max = 0;
  wraps.forEach(w => { max = Math.max(max, w.offsetWidth); });
  wraps.forEach(w => {
    w.style.width = max + 'px';
    w.dataset.closedWidth = max;
  });
}

function scrollBottom() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

document.addEventListener('click', e => {
  if (!document.getElementById('input-box').contains(e.target) && !document.getElementById('dropdown').contains(e.target)) {
    document.getElementById('dropdown').classList.remove('show');
  }
});
</script>
</body>
</html>
